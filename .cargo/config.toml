[alias]
kbuild = "build -p kernel --target x86_64-unknown-none"
kcheck = "check -p kernel --target x86_64-unknown-none"
xtask = "run -p xtask --"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "code-model=kernel",
    "-C", "force-frame-pointers=yes",
    "-C", "no-redzone=yes",
    "-C", "link-arg=-Tkernel/linker/x86_64.ld",
    "-C", "link-arg=--gc-sections",
    "-C", "relocation-model=static",
    # MISCOMPILE GUARD (docs/miscompile-audit.md): +sse* combined with this
    # target's default +soft-float makes LLVM 22.1.6 (rustc 1.97.0) shred
    # scalarized aggregate copies (stride-2 byte stores, odd bytes dropped).
    # x86_64-unknown-none's ABI baseline is soft-float with NO SSE (default
    # features: only fxsr), so disabling every SSE level is ABI-safe. The
    # explicit -sse* disables are belt-and-braces restatements of the target
    # default, guarding against a future target-spec default change; -mmx is
    # NOT listed (not a stable rustc feature name; already off by default).
    # Do not re-add any +sse* here without re-running miscompile-repro/
    # run-matrix.sh AND scan_asm against the kernel ELF.
    "-C", "target-feature=+cmpxchg16b,+xsave,-sse,-sse2,-sse3,-ssse3,-sse4.1,-sse4.2,-avx,-avx2",
]
